name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy --strict)
        run: uv run mypy

      - name: Test (offline)
        run: uv run pytest

      - name: Validate committed dataset against schema
        run: >-
          uv run python -c "import json,jsonschema;
          s=json.load(open('data/v1/schema.json'));
          jsonschema.validate(json.load(open('data/v1/latest.json')), s);
          print('data/v1/latest.json is valid')"
